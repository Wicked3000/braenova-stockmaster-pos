<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | StockMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0c0c0c; color: #ffffff; font-family: 'Inter', system-ui, -apple-system; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #151515; border: 1px solid #333; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .form-control { background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; padding: 12px 15px; }
        .form-control:focus { background: #1a1a1a; border-color: #f91a8e; color: #fff; box-shadow: 0 0 0 0.25rem rgba(249, 26, 142, 0.25); }
        .btn-brand { background: #f91a8e; color: white; font-weight: 700; border-radius: 10px; padding: 12px; border: none; }
        .btn-brand:hover { background: #d8157a; color: white; }
        .logo-img { height: 60px; border-radius: 12px; margin-bottom: 20px; }
        .brand-text { color: #fff; font-weight: 900; letter-spacing: -0.5px; font-size: 1.5rem; line-height: 1.1; margin-bottom: 30px; }
        .brand-text span { color: #f91a8e; display: block; font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="login-card text-center">
        <a href="/" style="text-decoration: none;">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="logo-img">
            <div class="brand-text">BRAENOVA<span>STOCKMASTER</span></div>
        </a>

        <h5 class="mb-4 fw-bold">Register Your Shop</h5>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} py-2 px-3" style="font-size: 0.85rem;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('register') }}" method="POST">
            <div class="mb-3 text-start">
                <label class="form-label" style="font-size: 0.8rem; color: #888;">Shop / Business Name</label>
                <input type="text" name="shop_name" class="form-control" required placeholder="e.g. John's Tuck Shop">
            </div>
            <div class="mb-3 text-start">
                <label class="form-label" style="font-size: 0.8rem; color: #888;">Owner Username</label>
                <input type="text" name="username" class="form-control" required placeholder="Choose a username">
            </div>
            <div class="mb-4 text-start">
                <label class="form-label" style="font-size: 0.8rem; color: #888;">Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Choose a secure password">
            </div>
            <button type="submit" class="btn btn-brand w-100 mb-3">Create Account</button>
            <a href="/login" class="text-decoration-none" style="font-size: 0.85rem; color: #888;">Already have an account? <span style="color: #f91a8e;">Login</span></a>
        </form>
    </div>
</div>

</body>
</html>
